<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00b4d8">
    <title>WiFiKey2</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Connection bar -->
    <div class="connect-bar">
        <input type="text" id="server-url" class="url-input"
               placeholder="ws://192.168.1.10:8765/ws" autocomplete="off" autocorrect="off">
        <input type="password" id="password" class="pass-input" placeholder="Password">
        <button id="connect-btn" class="btn-connect">接続</button>
    </div>

    <!-- Status -->
    <div id="status-bar" class="status-bar disconnected">
        <span id="status-text">未接続</span>
    </div>

    <!-- Main content (shown after auth) -->
    <div id="main-content" class="main-content hidden">

        <!-- Rig display -->
        <div class="rig-section">
            <div class="freq-display">
                <span id="freq-display">--.---.---</span>
                <span class="freq-unit"> Hz</span>
            </div>
            <div class="mode-display" id="mode-display">---</div>
        </div>

        <!-- Frequency steps -->
        <div class="step-section">
            <div class="step-row">
                <button class="step-btn" data-dir="up"   data-step="100">▲100</button>
                <button class="step-btn" data-dir="up"   data-step="1000">▲1k</button>
                <button class="step-btn" data-dir="up"   data-step="10000">▲10k</button>
            </div>
            <div class="step-row">
                <button class="step-btn" data-dir="down" data-step="100">▼100</button>
                <button class="step-btn" data-dir="down" data-step="1000">▼1k</button>
                <button class="step-btn" data-dir="down" data-step="10000">▼10k</button>
            </div>
        </div>

        <!-- Mode selector -->
        <div class="mode-section">
            <select id="mode-select" class="mode-select">
                <option value="CW-U">CW-U</option>
                <option value="CW-L">CW-L</option>
                <option value="USB">USB</option>
                <option value="LSB">LSB</option>
                <option value="AM">AM</option>
                <option value="FM">FM</option>
            </select>
            <button id="mode-set-btn" class="btn-secondary">Set Mode</button>
        </div>

        <!-- KEY button -->
        <div class="key-section">
            <button id="key-btn" class="key-btn">KEY</button>
        </div>

        <!-- Stats row -->
        <div class="stats-section">
            <span class="stat">RTT: <span id="rtt-ms">-</span> ms</span>
            <span class="stat">WPM: <span id="wpm-val">-</span></span>
            <span class="stat" id="kcp-status">KCP: -</span>
        </div>

        <!-- Web Serial (Chrome/Edge only – hidden on unsupported browsers) -->
        <div id="serial-section" class="serial-section hidden">
            <select id="serial-select" class="serial-select">
                <option value="">シリアルポート選択...</option>
            </select>
            <button id="serial-connect-btn" class="btn-secondary">接続</button>
            <span id="serial-status" class="serial-status">未接続</span>
        </div>

    </div><!-- /main-content -->

    <script src="app.js"></script>
</body>
</html>
